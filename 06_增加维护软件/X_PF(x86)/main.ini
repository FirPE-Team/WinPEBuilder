// 此配置文件为内置工具配置文件，可根据实际需要修改，具体帮助文档可参考PECMD

// 以下为常用命令格式（//为注释，[]内为可选参数，实际不需要加"[]"）
// 创建桌面快捷方式：
//    LINK %Desktop%\快捷方式名称,目标路径[,运行参数][,图标路径]
// 创建开始菜单快捷方式：
//    LINK %Programs%\快捷方式名称,目标路径[,运行参数][,图标路径]
// 注册热键：
//    HOTK 热键,目标路径
// 运行程序（!表示隐藏运行）：
//    EXEC[!] 目标路径
// 注：%CurDir%: 当前目录，%Desktop%: 系统桌面，%Programs%: 开始菜单路径

// 您也可根据以下实际命令来修改

// 注册软件热键
HOTK ALT+M,%CurDir%\系统维护\mouse.exe

// 创建桌面快捷方式
LINK %Desktop%\Dism++,%CurDir%\备份还原\Dism++\Dism++x64.exe,,%CurDir%\备份还原\Dism++\Dism++.ico
LINK %Desktop%\EasyRC 一键重装,%CurDir%\备份还原\EasyRC\EasyRCV3.exe
LINK %Desktop%\CGI,%CurDir%\备份还原\CGI.exe,,%CurDir%\备份还原\CGI.ico
LINK %Desktop%\分区工具 DiskGenius,%CurDir%\硬盘工具\DiskGenius.exe,,%CurDir%\硬盘工具\DiskGenius.ico
LINK %Desktop%\分区助手,%CurDir%\硬盘工具\PartAssist.exe,,%CurDir%\硬盘工具\PartAssist.ico
LINK %Desktop%\Windows 密码修改,%CurDir%\系统维护\WindowsLoginUnlocker.EXE,,%CurDir%\系统维护\WindowsLoginUnlocker.ico
LINK %Desktop%\硬件检测,%CurDir%\硬件检测\CPUZ.exe,,%CurDir%\硬件检测\CPUZ.ico
LINK %Desktop%\系统引导修复,%CurDir%\备份还原\EasyRC\EasyRCV3.exe,/Fixallboot,%CurDir%\备份还原\EasyRC\BOOTautofix.ico
LINK %Desktop%\360极速浏览器,%CurDir%\网络工具\360Chrome.exe
LINK %Desktop%\迅雷,%CurDir%\网络工具\Thunder.exe
LINK %Desktop%\远程协助,%CurDir%\网络工具\远程协助.exe,,%SystemDrive%\Users\Icon\shortcut\remote.ico
LINK %Desktop%\更多工具,%Programs%,,X:\users\Icon\shortcut\tools.ico

// 创建开始菜单快捷方式
LINK %Programs%\备份还原\Dism++ (映像处理工具),%CurDir%\备份还原\Dism++\Dism++x64.exe,,%CurDir%\备份还原\Dism++\Dism++.ico
LINK %Programs%\备份还原\CGI (系统备份还原),%CurDir%\备份还原\CGI.exe,,%CurDir%\备份还原\CGI.ico
LINK %Programs%\备份还原\WinNTSetup (系统安装工具),%CurDir%\备份还原\WinNTSetup\WinNTSetup.exe
LINK %Programs%\备份还原\EasyRC 一键重装,%CurDir%\备份还原\EasyRC\EasyRCV3.exe

LINK %Programs%\系统维护\Mouse (鼠标模拟器),%CurDir%\系统维护\mouse.exe
LINK %Programs%\系统维护\NTBootAutoFix (引导修复工具),%CurDir%\系统维护\NTBOOTautofix.exe,,%CurDir%\系统维护\NTBOOTautofix.ico
LINK %Programs%\系统维护\WindowsLoginUnlocker (密码修改工具),%CurDir%\系统维护\WindowsLoginUnlocker.EXE,,%CurDir%\系统维护\WindowsLoginUnlocker.ico
LINK %Programs%\系统维护\BlueScreenView (蓝屏分析),%CurDir%\系统维护\Windows蓝屏死机分析查看.exe
LINK %Programs%\系统维护\系统引导修复,%CurDir%\备份还原\EasyRC\EasyRCV3.exe,/Fixallboot,%CurDir%\备份还原\EasyRC\BOOTautofix.ico

LINK %Programs%\文件工具\7-zip (文件压缩与解压工具),%ProgramFiles%\7-Zip\7zfm.exe
LINK %Programs%\文件工具\Everything (文件搜索工具),%CurDir%\文件工具\Everything\Everything.exe
LINK %Programs%\文件工具\FastCopy (文件复制工具),%CurDir%\文件工具\FastCopy\FastCopy.exe
LINK %Programs%\文件工具\WinHex (16进制编辑工具),%CurDir%\文件工具\WinHex.exe
LINK %Programs%\文件工具\7-Data (数据恢复工具),%CurDir%\文件工具\7-Data.exe

LINK %Programs%\硬件检测\CPU-Z (CPU处理器检测工具),%CurDir%\硬件检测\CPUZ.exe,,%CurDir%\硬件检测\CPUZ.ico
LINK %Programs%\硬件检测\AIDA64 (硬件检测工具),%CurDir%\硬件检测\Aida64.exe
LINK %Programs%\硬件检测\MemTest (内存测试工具),%CurDir%\硬件检测\MemTest.exe
LINK %Programs%\硬件检测\CrystalDiskInfo (硬盘检测工具),%CurDir%\硬件检测\CrystalDiskInfo.exe
LINK %Programs%\硬件检测\KeyBoardTest (键盘检测工具),%CurDir%\硬件检测\KeyBoardTest.exe
LINK %Programs%\硬件检测\DisplayX (显示器检测工具),%CurDir%\硬件检测\DisplayX.exe
LINK %Programs%\硬件检测\DesktopInfo (桌面硬件信息显示),%CurDir%\硬件检测\DesktopInfo.exe

LINK %Programs%\硬盘工具\DiskGenius (硬盘分区工具),%CurDir%\硬盘工具\DiskGenius.exe,,%CurDir%\硬盘工具\DiskGenius.ico
LINK %Programs%\硬盘工具\PartAssist (傲梅分区助手),%CurDir%\硬盘工具\PartAssist.exe,,%CurDir%\硬盘工具\PartAssist.ico
LINK %Programs%\硬盘工具\Bootice (引导扇区修改工具),%CurDir%\硬盘工具\Bootice.exe
LINK %Programs%\硬盘工具\Defraggler (碎片整理工具),%CurDir%\硬盘工具\Defraggler.exe

LINK %Programs%\网络工具\360极速浏览器 (浏览器),%CurDir%\网络工具\360Chrome.exe
LINK %Programs%\网络工具\Thunder (迅雷),%CurDir%\网络工具\Thunder.exe
LINK %Programs%\网络工具\远程协助,%CurDir%\网络工具\远程协助.exe,,%SystemDrive%\Users\Icon\shortcut\remote.ico
LINK %Programs%\网络工具\Mstsc (远程桌面连接),%CurDir%\网络工具\Mstsc.exe
LINK %Programs%\网络工具\iStorage (ISCSI服务),%CurDir%\网络工具\iStorage.exe

// 注册部分软件
REGI $HKLM\SOFTWARE\Classes\*\shellex\ContextMenuHandlers\FastCopy\\={72FF462B-AB7D-427A-A268-E22E414933D7}
REGI #HKLM\SOFTWARE\Classes\*\shellex\ContextMenuHandlers\FastCopy\\FastCopyMenuFlags2=4277211100
EXEC !regsvr32.exe /s "%CurDir%\文件工具\FastCopy\FastEx64.dll"
