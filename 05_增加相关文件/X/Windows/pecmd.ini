//  FirPE内的源代码遵循MPL 2.0开源协议，请勿用作商业用途
//  如需对FirPE进行修改并发布，在发布/宣传页面（包括官方网站）均必须出现显眼的"此作品修改自FirPE"字样并存在FirPE官网的超链接（不得将其故意缩小、添加删除线或放置在二级及以上级菜单/页面内）

CALL WinPE_Hook beforeBoot sync

// 加载壁纸
LOGO %WinDir%\web\wallpaper\Windows\img0.jpg

// 初始化 WindowsPE
TIPS WinPE初始化,正在加载中...,6000,4,
EXEC @%WinDir%\System32\wpeinit.exe
INIT U

// 加载内置驱动
FORX "%ProgramFiles%\Drivers\*.7z",file,0,
{
  TEAM NAME fileName=%file% | FDIR fileDir=%file%
  IFEX "%fileDir%\%fileName%.index",EXEC !!=DriverIndexer.exe --debug load-driver "%file%" "%fileDir%\%fileName%.index" !EXEC !!=DriverIndexer.exe --debug load-driver "%file%"
}

// 显示ESP分区、U盘、移动硬盘隐藏分区
DEVI %SystemRoot%\INF\usbstor.inf
SHOW -check -1:-1
EXEC =!vtoydump.exe -m
EXEC =!"%ProgramFiles%\Others\加载ID42显示盘符.exe"

// 加载网络
serv netprofm
serv Wlansvc
serv Wcmsvc
serv Lanmanserver
serv W32Time
EXEC =!netcfg.exe -e -c p -i MS_NDISWAN

CALL WinPE_Hook afterBoot sync

// 加载内置软件
EXEC !ctfmon.exe
EXEC "%ProgramFiles%\WinXShell\WinXShell.exe" -regist -daemon
LOAD "%ProgramFiles(x86)%\main.ini"
HOTK Ctrl+Alt+A,"%ProgramFiles%\Others\ScreenCapture.exe"
HOTK Ctrl+Shift+Esc,taskmgr.exe
HOTK Alt+N,TEAM TIPS WinPE,正在加载本地网卡驱动,2000,4, | EXEC DrvIndex.exe -net
HOTK Alt+D,TEAM TIPS WinPE,正在加载本地驱动,2000,4, | EXEC DrvIndex.exe -y -hide

CALL WinPE_Hook beforeDesktop sync

// 启动桌面
TIPS ""
REGI #HKEY_USERS\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced\\ShowSuperHidden=0
SHEL %WinDir%\explorer.exe
LOGO

// 删除 Desktop.ini
TEAM FILE %Public%\Desktop\desktop.ini|FILE %Desktop%\desktop.ini
REGI #HKEY_USERS\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced\\ShowSuperHidden=1

CALL WinPE_Hook afterDesktop async

// 加载WIFI连接程序
EXEC %ProgramFiles%\WinXShell\WinXShell.exe -hidewindow -ui -jcfg wxsUI\UI_WIFI.zip

// 设置网络共享密码（WinPE启动后异机可使用 \\本机IP地址\\盘符$ 访问全盘）
EXEC !cmd.exe /c "net user administrator 000000"

// 加载文件校验
EXEC !Regsvr32 /s "%WinDir%\System32\HashTab.dll"

// 加载 MSI
EXEC !"%ProgramFiles%\Others\MSIx64.setup.exe"

// 创建硬链接
EXEC !cmd /c "MKLINK "%WinDir%\System32\changepk.exe" "%WinDir%\System32\winver.exe""

// 加载外置驱动
FORX !\boot\drivers\*.7z,file,0,
{
  TEAM NAME fileName=%file% | FDIR fileDir=%file%
  IFEX "%fileDir%\%fileName%.index",EXEC !!DriverIndexer.exe --debug load-driver "%file%" "%fileDir%\%fileName%.index" !EXEC !!DriverIndexer.exe --debug load-driver "%file%"
}

// 加载开始菜单快捷方式
LINK %Programs%\屏幕键盘,"%WinDir%\System32\osk.exe"
LINK %Programs%\检测更新,"%WinDir%\About.exe",/UpData
LINK %Programs%\理顺盘符,"%WinDir%\System32\PECMD.exe",TEAM EXEC "%ProgramFiles%\Others\orderdrv.exe" | REGI HKLM\Software\Microsoft\Windows\CurrentVersion\Explorer\DriveIcons\!,"%ProgramFiles%\Others\orderdrv.exe"
LINK %Programs%\更改主题,"%WinDir%\System32\PECMD.exe",EXEC! %WinDir%\System32\SwitchTheme.cmd,%WinDir%\SystemResources\imageres.dll.mun#186
LINK %Programs%\管理工具\计算机管理,"%WinDir%\System32\compmgmt.msc"
LINK %Programs%\管理工具\设备管理器,"%WinDir%\System32\devmgmt.msc"
LINK %Programs%\管理工具\磁盘管理,"%WinDir%\System32\diskmgmt.msc"
LINK %Programs%\管理工具\服务,"%WinDir%\System32\services.msc"
LINK %Programs%\管理工具\计算器,"%WinDir%\System32\calc.exe"
LINK %Programs%\管理工具\设置虚拟内存,"%WinDir%\System32\PECMD.exe",load "%ProgramFiles%\Others\VirtualMemory.wcs",X:\Users\Icon\type\wcs.ico
LINK %Programs%\管理工具\盘符管理,"%WinDir%\System32\PECMD.exe",load "%ProgramFiles%\Others\DriveLetterManage.wcs",X:\Users\Icon\type\wcs.ico
LINK %Programs%\管理工具\查看本地系统信息,"%WinDir%\System32\PECMD.exe",load "%ProgramFiles%\Others\LocalSystemInfo.wcs",X:\Users\Icon\type\wcs.ico
LINK %Programs%\管理工具\多显示器设置,"%WinDir%\System32\PECMD.exe",load "%ProgramFiles%\Others\DisplaySwitch.wcs",X:\Users\Icon\type\wcs.ico
LINK %Programs%\管理工具\加载本地驱动,"%WinDir%\System32\PECMD.exe",EXEC DrvIndex.exe -y,X:\Users\Icon\type\wcs.ico
LINK %Programs%\管理工具\加载本地网卡驱动,"%WinDir%\System32\PECMD.exe",EXEC DrvIndex.exe -net,X:\Users\Icon\type\wcs.ico
LINK %Programs%\网络工具\网络管理,"%ProgramFiles%\PENetwork\PENetwork.exe"
LINK %Programs%\网络工具\宽带拨号,"%WinDir%\System32\rasphone.pbk"
LINK %Programs%\网络工具\共享访问设置,"%ProgramFiles%\Others\共享访问设置.cmd"
LINK %Programs%\网络工具\下载Edgeless插件包,"%WinDir%\System32\PECMD.exe",load "%ProgramFiles%\Edgeless\plugin_downloader\GUI.wcs",%SystemDrive%\Users\Icon\shortcut\down.ico
LINK %Programs%\网络工具\HotPEModule模块管理,"%ProgramFiles%\HotPEModule\HPMMGR.exe"

// 自动运行网启脚本
IFEX %WinDir%\System32\PXEAutoRun.cmd,{
  TIPS WinPE初始化,正在运行网启脚本,3000,4,
  EXEC !%WinDir%\System32\PXEAutoRun.cmd
}

CALL WinPE_Hook onBootFinished async

// WinPE生命周期钩子
// 参数1: 阶段名称
// 参数2: 运行策略(sync/async)
_SUB WinPE_Hook
  ENVI &&stage=%1
  ENVI &&policy=%2
  ENVI &&scriptPath="%WinDir%\hooks\%&stage%.cmd"
  TEAM DATE time h min s ms | MSTR hour,minute,second,msec=<1><2><3><4>%time%
  WRIT X:\Users\Log.txt,$+0,%hour%:%minute%:%second%.%msec% 系统钩子模块启动 阶段：%&stage%，策略：%&policy%
  IFEX |%&policy%=sync,EXEC =!!%&scriptPath%
  IFEX |%&policy%=async,EXEC !!%&scriptPath%
_END
